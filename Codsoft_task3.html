<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Calculator with Backspace</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #121212;
        }

        .calculator {
            width: 320px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        #display {
            width: 100%;
            height: 70px;
            background: #2a2a2a;
            color: #ffffff;
            text-align: right;
            padding: 20px;
            font-size: 2rem;
            border-radius: 12px;
            margin-bottom: 20px;
            border: none;
            
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 equal columns */
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #333;
            color: white;
            transition: background 0.2s;
        }

        button:hover {
            background: #444;
        }

        /* Color coding */
        .operator { background: #ff9500; }
        .operator:hover { background: #ffaa33; }
        
        .clear { background: #ff3b30; }
        .backspace { background: #555; }
        
        .equal { 
            background: #34c759; 
            grid-column: span 2; 
        }

    </style>
</head>
<body>

    <div class="calculator">
        <div id="display">0</div>
        <div class="buttons">
            <button class="btn clear">C</button>
            <button class="btn backspace">⌫</button>
            <button class="btn operator">/</button>
            <button class="btn operator">*</button>

            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">9</button>
            <button class="btn operator">-</button>

            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
            <button class="btn operator">+</button>

            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
            <button class="btn">0</button>

            <button class="btn">.</button>
            <button class="btn equal">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const buttons = document.querySelectorAll('.btn');
        let currentExpression = "";

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const value = button.innerText;

                if (value === 'C') {
                    currentExpression = "";
                    display.innerText = "0";
                } 
                else if (value === '⌫') {
                    // Remove the last character
                    currentExpression = currentExpression.toString().slice(0, -1);
                    display.innerText = currentExpression || "0";
                }
                else if (value === '=') {
                    try {
                        // Evaluate the string
                        let result = eval(currentExpression);
                        display.innerText = result;
                        currentExpression = result.toString();
                    } catch {
                        display.innerText = "Error";
                        currentExpression = "";
                    }
                } 
                else {
                    // Logic to handle clicking numbers and operators
                    if (display.innerText === "0" && value !== ".") {
                        currentExpression = value;
                    } else {
                        currentExpression += value;
                    }
                    display.innerText = currentExpression;
                }
            });
        });
    </script>
</body>
</html>
